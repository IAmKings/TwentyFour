name: Android Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  JAVA_VERSION: '17'
  ANDROID_COMPOSE_VERSION: '1.8.0'

jobs:
  # ============ Build Job ============
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('twenty-four-cmp/**/*.gradle*', 'twenty-four-cmp/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Debug APK
        run: |
          cd twenty-four-cmp
          ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: twenty-four-cmp/composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ============ Release Job (only on tags) ============
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('twenty-four-cmp/**/*.gradle*', 'twenty-four-cmp/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android Release APK
        run: |
          cd twenty-four-cmp
          ./gradlew :composeApp:assembleRelease --no-daemon

      - name: Build Android App Bundle (AAB)
        run: |
          cd twenty-four-cmp
          ./gradlew :composeApp:bundleRelease --no-daemon

      - name: Get Tag Version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: TwentyFour CMP v${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: |
            twenty-four-cmp/composeApp/build/outputs/apk/release/*.apk
            twenty-four-cmp/composeApp/build/outputs/bundle/release/*.aab

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
